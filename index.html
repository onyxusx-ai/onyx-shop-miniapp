<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onyx Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background: black;
      color: white;
      font-family: sans-serif;
      padding: 20px;
      margin: 0;
    }

    button {
      display: block;
      width: 100%;
      max-width: 320px;
      margin-bottom: 12px;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>Onyx Shop</h1>

  <button onclick="buy('Футболка', 1500)">Футболка — 1500₽</button>
  <button onclick="buy('Худи', 3000)">Худи — 3000₽</button>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if (tg) {
      tg.expand();
    }

    function buy(name, price) {
      const data = {
        product: name,
        price: price
      };

      if (tg) {
        tg.sendData(JSON.stringify(data));
      } else {
        alert(`Вы выбрали: ${name} за ${price}₽`);
      }
    }
  </script>

</body>
</html>
